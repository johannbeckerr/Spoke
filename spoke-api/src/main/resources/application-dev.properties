# --- DEV profile: H2 in-memory database ---
# Everything lives in memory and is wiped when the app stops. Perfect for development.

spring.datasource.url=jdbc:h2:mem:spokedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creates/updates the tables automatically from our @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Run data.sql AFTER Hibernate builds the schema (otherwise the seed inserts
# run before the tables exist and fail on startup).
spring.jpa.defer-datasource-initialization=true

# Log the SQL that Hibernate runs — helpful for learning what happens under the hood
spring.jpa.show-sql=true

# Browse the database in your browser at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:spokedb, user: sa, empty password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
