# --- PROD profile: PostgreSQL ---
# Values come from environment variables so no secrets live in the code.
# The part after the colon (e.g. :spoke) is a default used when the variable is not set.

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:spoke}
spring.datasource.username=${DB_USER:spoke}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" keeps the schema in sync with the entities. Fine for an MVP;
# a mature app would switch to migrations (Flyway/Liquibase) later.
spring.jpa.hibernate.ddl-auto=update

# Don't flood production logs with SQL
spring.jpa.show-sql=false
